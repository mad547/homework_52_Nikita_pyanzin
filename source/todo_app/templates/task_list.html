{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <title>Список задач</title>
</head>
<body>
<nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container">
        <div class="navbar-nav">
            <a class=" nav-link active" href="/tasks/">Все задачи</a>
        </div>
    </div>
</nav>
<div class="container">
    <div class="border rounded-3 my-4 d-flex justify-content-between p-3">
        <h1>Задачи</h1>
        <a class="btn btn-sm btn-outline-primary fs-5 px-3 lh-lg" href="/task/add/">Добавить задачу</a>
    </div>
    <table class="table table-hover">
        <thead>
            <tr>
                <th>#</th>
                <th>Описание</th>
                <th>Статус</th>
                <th>Дата выполнения</th>
                <th>Удалить</th>
            </tr>
        </thead>
        <tbody>
        {% for task in tasks %}
        <tr>
            <td>{{ forloop.counter }}</td>
            <td>{{ task.description }}</td>
            <td>
                <span class="badge-status badge-{{ task.status }}">
                    {{ task.get_status_display }}
                </span>
            </td>
            <td>{{ task.due_date|default:"-" }}</td>
            <td>
                <a href="/tasks/delete/?id={{ task.id }}" class="text-danger">Удалить</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="5" class="text-muted">Задач пока нет</td>
        </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
