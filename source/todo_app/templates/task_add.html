{% load static %}
<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <title>Добавить задачу</title>
</head>
<body>
<nav class="navbar navbar-expand-lg bg-bodo-tertiary">
    <div class="container">
        <div class="navbar-nav">
            <a class="nav-link active" href="/tasks/">Все задачи</a>
        </div>
    </div>
</nav>
<div class="container">
    <div class="card my-5">
        <div class="card-header fs-4 text-center py-3">Создание задачи</div>
        <div class="card-body">
            <form id="task-form" action="" method="POST">
                {% csrf_token %}
                <div class="form-floating mb-3">
                    <textarea class="form-control" id="description" name="description"
                                placeholder="Описание" style="height: 100px"></textarea>
                    <label for="description">Описание</label>
                </div>
                <div class="form-floating mb-3">
                    <select class="form-control" id="status" name="status">
                        {% for value, label in status_choices %}
                            <option value="{{ value }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                    <label for="status">Статус</label>
                </div>
                <div class="form-floating mb-3">
                    <input type="date" class="form-control" id="due_date"
                           name="due_date" placeholder="Дата выполнения">
                    <label for="due_date">Дата выполнения</label>
                </div>
            </form>
        </div>
        <div class="card-footer text-end py-3">
            <button type="submit" form="task-form" class="btn btn-sm btn-primary">Сохранить</button>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
